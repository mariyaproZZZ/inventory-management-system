<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система учёта складских запасов</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>
                <i class="fas fa-warehouse"></i> 
                Система учёта складских запасов
            </h1>
            <p class="subtitle">Управление товарами на складе</p>
        </header>

        <div class="control-panel">
            <button class="btn btn-primary" id="showAddModalBtn">
                <i class="fas fa-plus"></i> Добавить товар
            </button>
            <div class="filters">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">Все категории</option>
                </select>
                <input type="text" id="searchInput" placeholder="Поиск по названию..." class="search-input">
            </div>
        </div>

        <div class="stats-container" id="statsContainer"></div>

        <div class="table-container">
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Наименование</th>
                        <th>Категория</th>
                        <th>Количество</th>
                        <th>Цена (₽)</th>
                        <th>Сумма (₽)</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Добавление товара</h2>
                <span class="close">&times;</span>
            </div>
            <form id="itemForm">
                <input type="hidden" id="itemId">
                
                <div class="form-group">
                    <label for="itemName">Наименование товара *</label>
                    <input type="text" id="itemName" required>
                </div>

                <div class="form-group">
                    <label for="category">Категория *</label>
                    <select id="category" required>
                        <option value="">Выберите категорию</option>
                        <option value="Электроника">Электроника</option>
                        <option value="Инструменты">Инструменты</option>
                        <option value="Расходные материалы">Расходные материалы</option>
                        <option value="Оборудование">Оборудование</option>
                        <option value="Мебель">Мебель</option>
                        <option value="Канцелярия">Канцелярия</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="quantity">Количество *</label>
                        <input type="number" id="quantity" min="0" required>
                    </div>
                    <div class="form-group half">
                        <label for="price">Цена за единицу (₽) *</label>
                        <input type="number" id="price" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="minQuantity">Минимальный остаток (порог)</label>
                    <input type="number" id="minQuantity" min="0" value="5">
                </div>

                <div class="form-group">
                    <label for="location">Место хранения</label>
                    <input type="text" id="location" placeholder="Стеллаж, ряд, ячейка">
                </div>

                <div class="form-group">
                    <label for="supplier">Поставщик</label>
                    <input type="text" id="supplier" placeholder="Наименование поставщика">
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Детали товара</h2>
                <span class="close-details">&times;</span>
            </div>
            <div id="detailsContent"></div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
